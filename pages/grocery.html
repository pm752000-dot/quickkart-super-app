<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickKart - Grocery</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header>
  <div class="logo">🛒 QuickKart Grocery</div>
</header>

<section class="featured">
  <h2>Fresh Grocery</h2>

  <div class="products">

    <div class="product">
      <h3>🍎 Apple</h3>
      <p>₹120/kg</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <h3>🍌 Banana</h3>
      <p>₹60/dozen</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <h3>🥔 Potato</h3>
      <p>₹35/kg</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <h3>🧅 Onion</h3>
      <p>₹40/kg</p>
      <button>Add to Cart</button>
    </div>

  </div>
</section>
<script src="../assets/js/app.js"></script>
</body>
</html>
